<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Grade</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=DM+Serif+Text&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/CSS/style.css">
</head>
<body>

    <main class="dashboard">
        <section class="left-side">
            <div class="logo">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
            <h1>Academic Dashboard</h1>
  <p> Analyze your student's performance quickly.   </p>

            <div class="features">
                <div class="feature">
                    <i class="fa-solid fa-check"></i>
                    <span>Fast Analysis</span>
                </div>

                <div class="feature">
                    <i class="fa-solid fa-chart-column"></i>
                    <span>Performance Report</span>
                </div>

                <div class="feature">
                    <i class="fa-solid fa-award"></i>
                    <span>Smart Evaluation</span>
                </div>
            </div>
        </section>
        <section class="right-side">
            <h2>Student Grade</h2>
            <div class="input-group">
                <label for="grade"> Enter Grade </label>
  <input  type="number" id="grade" placeholder="0 - 100">
 </div>

            <button onclick="checkGrade()">
                <i class="fa-solid fa-magnifying-glass"></i>
                Analyze Result
            </button>

            <div class="result" id="resultBox">

                <div class="cards">
                    <div class="small-card">
                        <span>Grade</span>
                        <h3 id="gradeValue">--</h3>
                    </div>
                    <div class="small-card">
                        <span>Status</span>
                        <h3 id="result">---</h3>
                    </div>
                </div>

                <h4>Performance</h4>
                <div class="progress">
                    <div id="bar"></div>
                </div>
                <p id="percentage">0%</p>
            </div>
        </section>
    </main>


<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<script src="assets/js/main_.js"></script>
</body>
</html>
